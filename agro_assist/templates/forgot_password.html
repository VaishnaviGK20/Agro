{% extends 'base.html' %}

{% block title %}Forgot Password | Agro Assist{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1>Forgot password</h1>
        {% if msg %}<div class="alert alert-error">{{ msg }}</div>{% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Registered email</label>
                <input type="email" name="email" id="email" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Send OTP</button>
        </form>
        <p style="margin-top:1rem;"><a href="{% url 'login' %}">Back to sign in</a></p>
    </div>
</section>
{% endblock %}

{% block footer %}{% endblock %}
